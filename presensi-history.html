    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('presensiList');
            const emptyDataBox = document.getElementById('emptyData');
            
            let records = JSON.parse(localStorage.getItem('presensiRecord') || '[]');
            
            if (records.length === 0) {
                emptyDataBox.classList.remove('hidden');
            } else {
                records.forEach(record => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition';
                    
                    const badgeClass = record.type === 'masuk' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                    const typeLabel = record.type.charAt(0).toUpperCase() + record.type.slice(1);
                    
                    tr.innerHTML = `
                        <td class="py-3 px-4 text-gray-700">${record.date}</td>
                        <td class="py-3 px-4 font-medium text-gray-900">${record.time}</td>
                        <td class="py-3 px-4">
                            <span class="px-3 py-1 text-xs font-bold rounded-full ${badgeClass}">
                                ${typeLabel}
                            </span>
                        </td>
                        <td class="py-3 px-4">
                            <img src="${record.photo}" alt="Foto Selfie" class="w-16 h-16 object-cover rounded shadow-sm cursor-pointer hover:opacity-80 transition" onclick="window.open('${record.photo}')">
                        </td>
                    `;
                    listContainer.appendChild(tr);
                });
            }
        });
    </script>
