                    <p class="text-xs text-blue-100">mahasiswa@kampus.ac.id</p>
                </div>
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-700 font-bold shadow-sm">
                    M
                </div>
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto flex flex-col items-center">

                </div>

                <div class="mb-6">

    <script>
        // Update Waktu Real-time
        function updateClock() {
            const now = new Date();
            
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', optionsDate);
            
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('currentTime').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Setup Kamera
        const video = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const placeholder = document.getElementById('cameraPlaceholder');
        let stream = null;

        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    placeholder.style.display = 'none';
                };
            } catch (err) {
                placeholder.innerHTML = '<p class="text-white text-sm bg-red-600 bg-opacity-80 px-4 py-2 rounded">Akses kamera ditolak atau tidak ditemukan</p>';
                console.error("Camera error:", err);
            }
        }
        initCamera();

        // Handle Tombol
        function captureAndSimulateSubmit(type) {
            if (!stream) {
                alert("Kamera belum aktif!");
                return;
            }

            const dateStr = document.getElementById('currentDate').innerText;
            
            // Mengecek apakah sudah absen masuk/keluar pada hari ini
            let presensiList = JSON.parse(localStorage.getItem('presensiRecord') || '[]');
            const sudahAbsen = presensiList.some(p => p.date === dateStr && p.type === type);

            if (sudahAbsen) {
                const statusBox = document.getElementById('statusMessage');
                statusBox.className = 'mt-6 p-4 rounded-lg text-center font-medium shadow-sm transition-all bg-yellow-100 text-yellow-800 border-yellow-200';
                statusBox.innerHTML = `⚠️ Anda sudah merekam presensi <b>${type.toUpperCase()}</b> untuk hari ini (${dateStr}).`;
                statusBox.classList.remove('hidden');
                return;
            }

            const timeStr = document.getElementById('currentTime').innerText;

            // Membekukan gambar sesaat dan konversi ke Base64 (DataURL)
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.classList.remove('hidden');
            const photoData = canvas.toDataURL('image/jpeg');
            
            // Menyimpan presensi ke localStorage
            presensiList.unshift({
                type: type, // 'masuk' atau 'keluar'
                date: dateStr,
                time: timeStr,
                photo: photoData,
                timestamp: new Date().getTime() // untuk sorting
            });
            localStorage.setItem('presensiRecord', JSON.stringify(presensiList));

            const statusBox = document.getElementById('statusMessage');
            statusBox.className = 'mt-6 p-4 rounded-lg text-center font-medium shadow-sm transition-all ' + 
                                  (type === 'masuk' ? 'bg-green-100 text-green-800 border-green-200' : 'bg-red-100 text-red-800 border-red-200');
            statusBox.innerHTML = `✅ Berhasil absen <b>${type.toUpperCase()}</b> pada <br> ${dateStr} pukul ${timeStr}`;
            statusBox.classList.remove('hidden');

            setTimeout(() => {
                canvas.classList.add('hidden'); // Kembali hidup setelah 3 detik
            }, 3000);
        }

        document.getElementById('btnBerangkat').addEventListener('click', () => captureAndSimulateSubmit('masuk'));
        document.getElementById('btnPulang').addEventListener('click', () => captureAndSimulateSubmit('keluar'));
    </script>
