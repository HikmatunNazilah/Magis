<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Presensi dan Administrasi Magang Dinas Kominfo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-white">
        <div class="text-center mb-8">
            <img src="image/logo.png" alt="Logo MAGIS" class="w-20 h-20 mx-auto object-contain drop-shadow-md mb-4 bg-blue-700 rounded-2xl p-2">
            <h1 class="font-extrabold text-3xl text-blue-900 tracking-tight">MAGIS</h1>
            <p class="text-gray-500 text-sm mt-2">Sistem Magang Informasi dan Sistem</p>
        </div>
        <form class="space-y-5" action="dashboard-mhs.html">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email / Username</label>
                <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm bg-gray-50/50" required placeholder="Masukkan email Anda">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm bg-gray-50/50" required placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
                    <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500 border-gray-300 h-4 w-4">
                    <span>Ingat saya</span>
                </label>
                <a href="#" class="text-blue-600 font-semibold hover:text-blue-700 transition">Lupa Password?</a>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-lg shadow-md hover:bg-blue-700 hover:shadow-lg transition transform duration-200">
                Masuk ke Dasbor
            </button>
        </form>
        <p class="text-center text-gray-600 text-sm mt-8">
            Belum punya akun? <a href="register.html" class="text-blue-600 font-bold hover:underline">Daftar Magang</a>
        </p>
        <div class="mt-6 border-t pt-4 text-center">
            <a href="login-admin.html" class="text-xs text-slate-400 hover:text-blue-600 transition font-medium">
                Masuk sebagai Admin
            </a>
        </div>
    </div>
</body>
</html>
