            <a href="daftar-magang.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>

            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition">

    <main class="ml-64 flex-1 flex flex-col min-h-screen relative pb-20">
        <header class="bg-blue-600 shadow-md h-20 flex items-center justify-between px-8 z-10 sticky top-0">
            <h2 class="text-xl font-bold text-white">Logbook Magang</h2>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-white">Mahasiswa</p>
                    <p class="text-xs text-blue-100">mahasiswa@kampus.ac.id</p>
                </div>
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-700 font-bold shadow-sm">M</div>
            </div>
        </header>
        
        <div class="p-8 flex-1 overflow-y-auto">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">Catatan Harian Magang</h3>
                <button onclick="document.getElementById('addLogModal').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">
                    + Tambah Logbook
                </button>
            </div>
            
            <!-- Table List -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-blue-50 text-blue-800 border-b border-blue-100">
                            <tr>
                                <th class="py-3 px-4 font-semibold rounded-tl-lg">Tanggal</th>
                                <th class="py-3 px-4 font-semibold">Kegiatan</th>
                                <th class="py-3 px-4 font-semibold rounded-tr-lg">Deskripsi / Hasil</th>
                            </tr>
                        </thead>
                        <tbody id="logbookTableBody" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="addLogModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl w-full max-w-lg">
            <h3 class="font-bold text-lg mb-4">Tambah Logbook Baru</h3>
            <form id="logbookForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Kegiatan</label>
                    <input type="date" id="logDate" required class="w-full border border-gray-300 rounded px-3 py-2 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Kegiatan</label>
                    <input type="text" id="logTitle" placeholder="Cth: Mengikuti rapat eval" required class="w-full border border-gray-300 rounded px-3 py-2 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi & Hasil</label>
                    <textarea id="logDesc" rows="4" placeholder="Jelaskan detail kegiatan..." required class="w-full border border-gray-300 rounded px-3 py-2 outline-none focus:border-blue-500"></textarea>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="document.getElementById('addLogModal').classList.add('hidden')" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded transition">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Simpan Logbook</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('logbookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const date = document.getElementById('logDate').value;
            const title = document.getElementById('logTitle').value;
            const desc = document.getElementById('logDesc').value;
            
            const tbody = document.getElementById('logbookTableBody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="py-3 px-4">${date}</td>
                <td class="py-3 px-4 font-medium text-gray-900">${title}</td>
                <td class="py-3 px-4 text-gray-600 text-sm whitespace-pre-wrap">${desc}</td>
            `;
            tbody.prepend(tr);
            
            document.getElementById('addLogModal').classList.add('hidden');
            e.target.reset();
        });
    </script>
</body>
</html>
