    <main class="ml-64 flex-1 flex flex-col min-h-screen">
        <header class="bg-blue-600 shadow-md h-20 flex items-center justify-between px-8 z-10 sticky top-0">
            <h2 class="text-xl font-bold text-white">Pendaftaran Magang</h2>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-white">Mahasiswa</p>
                    <p class="text-xs text-blue-100">mahasiswa@kampus.ac.id</p>
                </div>
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-700 font-bold shadow-sm">M</div>
            </div>
        </header>

        <div class="p-8 flex-1 overflow-y-auto">
            <div class="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto">
                <h3 class="text-xl font-bold mb-6 border-b pb-4">Formulir Pendaftaran Magang</h3>
                <form class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">NIM</label>
                            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Universitas / Instansi</label>
                        <input type="text" class="w-full border border-gray-300 rounded px-3 py-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Program Studi</label>
                        <input type="text" class="w-full border border-gray-300 rounded px-3 py-2" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Mulai</label>
                            <input type="date" class="w-full border border-gray-300 rounded px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Selesai</label>
                            <input type="date" class="w-full border border-gray-300 rounded px-3 py-2" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Curriculum Vitae (CV) (PDF)</label>
                        <input type="file" accept=".pdf" class="w-full border border-gray-300 rounded px-3 py-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Transkrip Nilai (PDF)</label>
                        <input type="file" accept=".pdf" class="w-full border border-gray-300 rounded px-3 py-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Surat Pengantar (PDF)</label>
                        <input type="file" accept=".pdf" class="w-full border border-gray-300 rounded px-3 py-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Proposal Magang (PDF)</label>
                        <input type="file" accept=".pdf" class="w-full border border-gray-300 rounded px-3 py-2" required>
                    </div>
                    <div class="pt-4 mt-6 border-t">
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-blue-700 transition">
                            Ajukan Pendaftaran
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
